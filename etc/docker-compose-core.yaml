services:
  mysql:
    container_name: ric5g-mysql
    image: mysql:8.0
    volumes:
      - ./oai_db.sql:/docker-entrypoint-initdb.d/oai_db.sql
      - ./mysql-healthcheck.sh:/tmp/mysql-healthcheck.sh
    environment:
      - TZ=Europe/Paris
      - MYSQL_DATABASE=oai_db
      - MYSQL_USER=test
      - MYSQL_PASSWORD=test
      - MYSQL_ROOT_PASSWORD=linux
    healthcheck:
      test: /bin/bash -c "/tmp/mysql-healthcheck.sh"
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      public_net:
        ipv4_address: 192.168.71.131

  oai-udr:
    container_name: ric5g-oai-udr
    image: oaisoftwarealliance/oai-udr:v2.0.0
    environment:
      - TZ=Europe/Paris
    volumes:
      - ./mini_nonrf_config.yaml:/openair-udr/etc/config.yaml
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      public_net:
        ipv4_address: 192.168.71.136

  oai-udm:
    container_name: ric5g-oai-udm
    image: oaisoftwarealliance/oai-udm:v2.0.0
    environment:
      - TZ=Europe/Paris
    volumes:
      - ./mini_nonrf_config.yaml:/openair-udm/etc/config.yaml
    depends_on:
      - oai-udr
    networks:
      public_net:
        ipv4_address: 192.168.71.137

  oai-ausf:
    container_name: ric5g-oai-ausf
    image: oaisoftwarealliance/oai-ausf:v2.0.0
    environment:
      - TZ=Europe/Paris
    volumes:
      - ./mini_nonrf_config.yaml:/openair-ausf/etc/config.yaml
    depends_on:
      - oai-udm
    networks:
      public_net:
        ipv4_address: 192.168.71.138

  oai-amf:
    container_name: ric5g-oai-amf
    image: oaisoftwarealliance/oai-amf:v2.0.0
    environment:
      - TZ=Europe/Paris
    volumes:
      - ./mini_nonrf_config.yaml:/openair-amf/etc/config.yaml
    depends_on:
      - oai-ausf
    networks:
      public_net:
        ipv4_address: 192.168.71.132

  oai-smf:
    container_name: ric5g-oai-smf
    image: oaisoftwarealliance/oai-smf:v2.0.0
    environment:
      - TZ=Europe/Paris
    volumes:
      - ./mini_nonrf_config.yaml:/openair-smf/etc/config.yaml
    depends_on:
      - oai-amf
    networks:
      public_net:
        ipv4_address: 192.168.71.133

  oai-upf:
    container_name: ric5g-oai-upf
    image: oaisoftwarealliance/oai-upf:v2.0.0
    environment:
      - TZ=Europe/Paris
    volumes:
      - ./mini_nonrf_config.yaml:/openair-upf/etc/config.yaml
      - ../bin/mgen:/usr/bin/mgen:ro
    # Interfaces are discovered at runtime by subnet: inside the container the
    # order is reversed vs. compose, so match on the address instead of eth0/eth1.
    # N3 (from remote cell-node gNBs) and N4 both ride the public_net side.
    entrypoint:
      - /bin/bash
      - -c
      - >
        N4=$$(ip -4 addr show | awk '/192\.168\.71\./{print $$NF}' | head -1);
        N6=$$(ip -4 addr show | awk '/192\.168\.72\./{print $$NF}' | head -1);
        cp /openair-upf/etc/config.yaml /tmp/upf_config.yaml;
        sed -i "s/N4_IFACE/$$N4/g; s/N6_IFACE/$$N6/g" /tmp/upf_config.yaml;
        ip route replace default via 192.168.72.135 dev $$N6;
        exec /openair-upf/bin/oai_upf -c /tmp/upf_config.yaml -o
    depends_on:
      - oai-smf
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    cap_drop:
      - ALL
    privileged: true
    networks:
      public_net:
        ipv4_address: 192.168.71.134
      traffic_net:
        ipv4_address: 192.168.72.134

  oai-ext-dn:
    privileged: true
    container_name: ric5g-oai-ext-dn
    image: oaisoftwarealliance/trf-gen-cn5g:focal
    entrypoint: /bin/bash -c \
          "iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE;"\
          "ip route add 12.1.1.0/24 via 192.168.72.134 dev eth0; sleep infinity"
    depends_on:
      - oai-upf
    networks:
      traffic_net:
        ipv4_address: 192.168.72.135
    volumes:
      - ../bin/mgen:/usr/bin/mgen:ro
    healthcheck:
      test: /bin/bash -c "ping -c 2 192.168.72.134"
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- near-RT RIC -------------------------------------------------------
  # E2 termination for all cell-node gNBs. Reached across the experimental
  # LAN via the core node's IP forwarding (see core-setup.sh).
  #
  # tty: true is REQUIRED. FlexRIC block-buffers stdout when not on a TTY, so
  # `docker logs` returns nothing at all and the RIC appears dead when it is
  # running fine. This cost hours of misdiagnosis.
  flexric:
    container_name: ric5g-flexric
    image: ghinwa555/flexric-kpm:v1
    tty: true
    environment:
      - TZ=Europe/Paris
    volumes:
      - ./flexric.conf:/usr/local/etc/flexric/flexric.conf
      - /local/logs/xapp:/tmp
    networks:
      public_net:
        ipv4_address: 192.168.71.142

  # ---- KPM monitoring xApp: DELIBERATELY NOT STARTED HERE ----------------
  #
  # A kpm-xapp service used to live here, starting 20s after the RIC. It is
  # removed on purpose. Do not add it back as an auto-started service.
  #
  # Why: it starts before any gNB has completed E2 setup, crashes (SIGSEGV,
  # exit 139), and leaves an orphaned SCTP association on the RIC's E42 port.
  # The RIC then accumulates zombie associations with full, never-drained
  # socket buffers, and subsequent xApps time out on E42 SETUP. Every RIC in
  # this testbed was poisoned from boot by this container.
  #
  # Run an xApp MANUALLY, and only after the gNBs have registered:
  #
  #   1. confirm the E2 nodes are up:
  #        docker logs ric5g-flexric 2>&1 | grep "E2 SETUP-REQUEST rx"
  #   2. confirm UEs are attached and carrying traffic (KPM is per-UE; an
  #      idle cell reports nothing)
  #   3. then, once:
  #        docker exec -it ric5g-flexric /usr/local/bin/xapp_kpm_moni
  #      Let it run to completion. Do NOT Ctrl+C it -- a killed xApp leaves a
  #      zombie association behind.
  #
  # Hard rule: never restart the RIC without also restarting every gNB. OAI's
  # E2 agent does not recover from a RIC restart -- it heartbeats the dead
  # association forever and the RIC replies SCTP ABORT. Restarting a gNB in
  # turn drops all of its UEs.

networks:
  public_net:
    driver: bridge
    name: ric5g-public
    ipam:
      config:
        - subnet: 192.168.71.128/26
    driver_opts:
      com.docker.network.bridge.name: "ric5g-public"
      # Docker >=28 drops traffic to container IPs arriving from outside the
      # bridge. Cell-node gNBs reach the AMF/UPF/RIC by IP across the LAN, so
      # that protection must be disabled for this network.
      com.docker.network.bridge.gateway_mode_ipv4: "nat-unprotected"
  traffic_net:
    driver: bridge
    name: ric5g-traffic
    ipam:
      config:
        - subnet: 192.168.72.128/26
    driver_opts:
      com.docker.network.bridge.name: "ric5g-traffic"
      com.docker.network.bridge.gateway_mode_ipv4: "nat-unprotected"
